  <!-- IndexNow API Call -->
  <script>
    (function () {
      const indexNowEndpoint = 'https://api.indexnow.org/IndexNow';
      const key = '846394871d2141deb28e4d4cd2392903';

      const data = {
        "host": "wising.app",
        "key": key,
        "keyLocation": `https://wising.app/${key}.txt`,
        "urlList": [
          "https://wising.app/",
          "https://wising.app/dashboard",
          "https://wising.app/about"
        ]
      };

      fetch(indexNowEndpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json; charset=utf-8'
        },
        body: JSON.stringify(data)
      }).then(response => {
        if (response.ok) {
          console.log('IndexNow request successful');
        } else {
          console.error('IndexNow request failed', response.statusText);
        }
      }).catch(error => {
        console.error('IndexNow request error', error);
      });
    })();
  </script>
